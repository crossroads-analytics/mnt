# netlify.toml
# MNT-Haushaltsauflösung — Netlify Konfiguration

[build]
  # Kein Build-Schritt nötig (statisches HTML/CSS/JS)
  publish = "."

# Weiterleitungen
[[redirects]]
  from    = "/danke"
  to      = "/danke.html"
  status  = 200

# Sicherheits-Header (empfohlen)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"